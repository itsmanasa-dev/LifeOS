name: lifeos
description: LifeOS - Your Personal Productivity Operating System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.5

  # Networking
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^19.4.0

  # UI
  google_fonts: ^6.3.1
  fl_chart: ^1.0.0
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  lottie: ^3.3.2
  table_calendar: ^3.2.0
  percent_indicator: ^4.2.5
  flutter_slidable: ^4.0.0
  gap: ^3.0.1
  badges: ^3.1.2
  icons_plus: ^5.0.0

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.2.0

  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  # Date
  intl: ^0.20.2
  jiffy: ^6.4.3

  # Navigation
  go_router: ^16.3.0

  # Utilities
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
